<!-- ANNOTATE2: Roboflow-style inline annotation editor -->
<div id="ann2-root" style="display:flex; flex-direction:column; height:100%; min-height:0; position:relative;">

  <!-- Toolbar row -->
  <div id="ann2-toolbar"
    style="display:flex; align-items:center; gap:6px; padding:6px 10px; background:var(--bg-secondary); border-bottom:1px solid var(--border); flex-shrink:0; position:sticky; top:0; z-index:1000;">
    <button class="tog-btn" id="ann2-prev-btn" onclick="ann2Prev()" title="Previous (A)">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor">
        <path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z" />
      </svg>
    </button>
    <span id="ann2-img-counter" style="font-size:.82rem;color:var(--text-secondary);min-width:70px;text-align:center">—
      / —</span>
    <button class="tog-btn" id="ann2-next-btn" onclick="ann2Next()" title="Next (D)">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor">
        <path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z" />
      </svg>
    </button>
    <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>

    <label style="font-size:.78rem;color:var(--text-muted);white-space:nowrap">Class:</label>
    <div style="position:relative; width:160px;">
      <input type="hidden" id="ann2-class-sel" value="">
      <div id="ann2-premium-sel-trigger" onclick="ann2ToggleClassMenu(event)"
        style="display:flex; align-items:center; gap:8px; background:var(--bg-tertiary); border:1px solid rgba(239, 68, 68, 0.4); border-radius:8px; padding:6px 12px; cursor:pointer; box-shadow: 0 0 12px rgba(239, 68, 68, 0.25); transition: all 0.2s;">
        <span id="ann2-class-color-dot"
          style="width:12px; height:12px; border-radius:50%; background:transparent; display:inline-block; border:1px solid rgba(255,255,255,0.1); transition: background 0.15s; flex-shrink:0;"></span>
        <span id="ann2-class-sel-text"
          style="flex:1; font-size:.85rem; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">—
          pilih —</span>
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:var(--text-muted)">
          <path d="M7,10L12,15L17,10H7Z" />
        </svg>
      </div>
      <div id="ann2-premium-sel-menu"
        style="display:none; position:absolute; top:calc(100% + 6px); left:0; width:100%; background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.4); z-index:9999; max-height:250px; overflow-y:auto; flex-direction:column; padding:6px;">
      </div>
    </div>

    <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>

    <!-- Auto Annotate toggle & settings -->
    <div style="display:flex; align-items:center; gap:6px;">
      <label id="ann2-auto-annotate-label"
        style="font-size:.78rem;color:var(--text-muted);white-space:nowrap;display:none;align-items:center;gap:6px;cursor:pointer;user-select:none;">
        <input type="checkbox" id="ann2-auto-annotate-chk" onchange="ann2ToggleAutoAnnotate(this.checked)"
          style="cursor:pointer;width:14px;height:14px;margin:0;accent-color:#a855f7;">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:#a855f7">
          <path d="M7.5,5.6L10,7L8.6,4.5L10,2L7.5,3.4L5,2L6.4,4.5L5,7L7.5,5.6M19.5,15.4L17,14L18.4,16.5L17,19L19.5,17.6L22,19L20.6,16.5L22,14L19.5,15.4M22,2L20.6,4.5L22,7L19.5,5.6L17,7L18.4,4.5L17,2L19.5,3.4L22,2M13.34,12.78L15.78,10.34L13.66,8.22L11.22,10.66L13.34,12.78M14.37,7.29L16.71,9.63C17.1,10 17.1,10.65 16.71,11.04L5.04,22.71C4.65,23.1 4,23.1 3.63,22.71L1.29,20.37C0.9,20 0.9,19.35 1.29,18.96L12.96,7.29C13.35,6.9 14,6.9 14.37,7.29Z" />
        </svg>
        Auto Annotate
      </label>
      <button class="btn btn-ghost" id="ann2-settings-btn" onclick="ann2OpenAutoSettingsModal()" title="Auto Annotate Settings"
        style="padding:3px 7px; font-size:.75rem; border-radius:5px; color:#a855f7; border:1px solid rgba(168,85,247,0.3); background:rgba(168,85,247,0.1); display:none; align-items:center; gap:4px; cursor:pointer;">
        ⚙ Settings
      </button>
      <!-- IOU Rejected Toggle -->
      <button id="ann2-iou-toggle" onclick="ann2ToggleIouRejected()" title="Show/hide annotations rejected due to IoU overlap"
        style="padding:3px 8px; font-size:.72rem; border-radius:5px; border:1px solid rgba(239,68,68,0.3); background:rgba(239,68,68,0.08); color:#f87171; display:none; align-items:center; gap:4px; cursor:pointer; transition:all .15s; white-space:nowrap;">
        <svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:currentColor;flex-shrink:0"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7Z"/></svg>
        IoU
      </button>
    </div>
    <!-- Magic Selection Settings -->
    <button class="btn btn-ghost" id="ann2-magic-settings-btn" onclick="ann2OpenMagicSettingsModal()" title="Magic Selection Settings"
      style="padding:3px 8px; font-size:.75rem; border-radius:5px; color:#a78bfa; border:1px solid rgba(139,92,246,0.3); background:rgba(139,92,246,0.1); display:none; align-items:center; gap:4px; cursor:pointer; margin-left:2px; white-space:nowrap;">
      ⚙ Magic Settings
    </button>

    <div style="flex:1;"></div>

    <label
      style="font-size:.78rem;color:var(--text-muted);white-space:nowrap;display:flex;align-items:center;gap:6px;cursor:pointer;margin-right:12px;user-select:none;">
      <input type="checkbox" id="ann2-autosave-chk" onchange="ann2ToggleAutosave(this.checked)"
        style="cursor:pointer;width:14px;height:14px;margin:0;">
      Autosave
    </label>
    <button class="btn btn-accent" onclick="ann2Save()" id="ann2-save-btn" style="padding:5px 14px;font-size:.82rem;">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:currentColor;margin-right:4px">
        <path
          d="M15,9H5V5H15M12,19A3,3 0 0,1 9,16A3,3 0 0,1 12,13A3,3 0 0,1 15,16A3,3 0 0,1 12,19M17,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V7L17,3Z" />
      </svg>
      Save (Ctrl+S)
    </button>
  </div>

  <!-- Main 3-column layout -->
  <div style="display:flex; flex:1; min-height:0; overflow:hidden;">

    <!-- LEFT PANEL: Annotation list -->
    <div id="ann2-left"
      style="width:215px; min-width:180px; flex-shrink:0; background:var(--bg-secondary); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden;">
      <div
        style="padding:10px 12px 6px; font-size:.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; gap:6px;">
        Annotations
        <span id="ann2-ann-count"
          style="background:var(--bg-tertiary);border-radius:9px;padding:1px 7px;font-size:.68rem;color:var(--text-secondary);">0</span>
      </div>
      <div id="ann2-ann-list" style="flex:0 1 auto; overflow-y:auto; padding:6px 0;"></div>

      <!-- Tags section -->
      <div style="border-top:1px solid var(--border); flex-shrink:0;">
        <div
          style="padding:8px 12px 5px; font-size:.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em;">
          Tags</div>
        <div id="ann2-tags-area" style="padding:0 8px 6px; display:flex; flex-wrap:wrap; gap:4px; min-height:28px;">
        </div>
        <div style="padding:0 8px 10px;">
          <select id="ann2-tag-sel"
            style="width:100%;padding:5px 8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:inherit;font-size:.8rem;box-sizing:border-box;cursor:pointer;"
            onchange="ann2AddTag(this)">
            <option value="">+ Tambah tag...</option>
          </select>
        </div>
      </div>
    </div>

    <!-- CENTER PANEL: Canvas area -->
    <div id="ann2-center"
      style="flex:1; display:flex; flex-direction:column; position:relative; overflow:hidden; background:#07090e; min-width:0;">
      <div id="ann2-canvas-wrap"
        style="flex:1; position:relative; overflow:hidden; display:flex; justify-content:center; align-items:center; cursor:crosshair; user-select:none;">
        <canvas id="ann2-canvas" style="display:block; image-rendering:pixelated;"></canvas>

        <!-- Floating toolbar overlay -->
        <div id="ann2-floating-tools"
          style="position:absolute; top:16px; right:16px; display:flex; flex-direction:column; gap:4px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; padding:4px; box-shadow:0 4px 16px rgba(0,0,0,0.4); z-index:100;">
          <button class="tog-btn ann2-tool-btn" id="ann2-tool-drag" onclick="ann2SetTool('drag')" title="Pan / Zoom (H)"
            style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
            <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
              <path
                d="M18,11H15V14H18V11M18,7H15V10H18V7M18,15H15V18H18V15M11,11H8V14H11V11M11,7H8V10H11V7M11,15H8V18H11V15M7,11H4V14H7V11M7,7H4V10H7V7M7,15H4V18H7V15Z" />
            </svg>
          </button>
          <button class="tog-btn ann2-tool-btn" id="ann2-tool-bbox" onclick="ann2SetTool('bbox')"
            title="Bounding Box (B)"
            style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
            <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
              <path
                d="M3,3H21V21H3V3M5,5V19H19V5H5Z" />
            </svg>
          </button>
          <button class="tog-btn ann2-tool-btn" id="ann2-tool-polygon" onclick="ann2SetTool('polygon')"
            title="Polygon (P) - Enter = konfirmasi · Esc = batal"
            style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
            <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
              <path
                d="M17,15.7V13H19V17H15V15H17.7L12.5,9.8L7.8,14.5L3,9.7L4.4,8.3L7.8,11.7L12.5,7L18.4,12.9V10H20.4V14H18.4V15.7H17Z" />
            </svg>
          </button>
          <button class="tog-btn ann2-tool-btn" id="ann2-tool-edit" onclick="ann2SetTool('edit')"
            title="Edit BBox/Polygon (E)"
            style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
            <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
              <path
                d="M13.64,21.97C13.14,22.21 12.54,22 12.31,21.5L10.13,16.76L7.62,19.27C7.23,19.66 6.58,19.66 6.19,19.27C6,19.08 5.9,18.83 5.9,18.57V3.5C5.9,2.95 6.35,2.5 6.9,2.5C7.16,2.5 7.41,2.6 7.6,2.79L18.58,13.77C18.97,14.16 18.97,14.81 18.58,15.2C18.39,15.39 18.14,15.49 17.88,15.49H14.88L17.07,20.23C17.3,20.73 17.1,21.56L13.64,21.97Z" />
            </svg>
          </button>
          <div style="width:28px;height:1px;background:var(--border);margin:2px auto;"></div>
          <button class="tog-btn ann2-tool-btn" id="ann2-tool-magic" onclick="ann2SetTool('magic')"
            title="Magic Selection (M) - SAM 3.1 point-to-segment&#10;Click = positive point&#10;Ctrl+Click = negative point&#10;Enter = konfirmasi · Esc = batal"
            style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer; position:relative;">
            <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
              <path
                d="M7.5,5.6L10,7L8.6,4.5L10,2L7.5,3.4L5,2L6.4,4.5L5,7L7.5,5.6M19.5,15.4L17,14L18.4,16.5L17,19L19.5,17.6L22,19L20.6,16.5L22,14L19.5,15.4M22,2L20.6,4.5L22,7L19.5,5.6L17,7L18.4,4.5L17,2L19.5,3.4L22,2M13.34,12.78L15.78,10.34L13.66,8.22L11.22,10.66L13.34,12.78M14.37,7.29L16.71,9.63C17.1,10 17.1,10.65 16.71,11.04L5.04,22.71C4.65,23.1 4,23.1 3.63,22.71L1.29,20.37C0.9,20 0.9,19.35 1.29,18.96L12.96,7.29C13.35,6.9 14,6.9 14.37,7.29Z" />
            </svg>
          </button>
          <button class="tog-btn ann2-tool-btn" id="ann2-tool-autoann" onclick="ann2SetTool('autoann')"
            title="Auto Annotate - SAM text-prompt auto segmentation"
            style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer; position:relative;">
            <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
              <path d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M12,6L14.12,10.5L19,11.13L15.5,14.5L16.24,19.37L12,17.12L7.76,19.37L8.5,14.5L5,11.13L9.88,10.5L12,6Z" />
            </svg>
          </button>
        </div>


        <!-- Processing overlay -->
        <div id="ann2-processing-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.7); z-index:200; justify-content:center; align-items:center; flex-direction:column; gap:16px;">
          <div class="ann2-processing-spinner"></div>
          <div style="color:#e2e8f0; font-size:1.1rem; font-weight:600; letter-spacing:.03em;">Processing...</div>
          <div id="ann2-processing-detail" style="color:var(--text-muted); font-size:.8rem;"></div>
        </div>

        <!-- Floating overlay for shortcuts and simplify panel -->
        <div style="position:absolute; top:20px; right:70px; z-index:100; display:flex; flex-direction:column; gap:8px; align-items:flex-end; pointer-events:none;">
          <div id="ann2-shortcut-hints" style="display:none; flex-direction:column; gap:4px; pointer-events:auto;"></div>

          <!-- Simplify Slider Panel (shown when temp/permanent polygon is selected) -->
          <div id="ann2-simplify-panel" style="display:none; flex-direction:column; gap:6px; background:rgba(13,18,34,0.92); border:1px solid var(--border); border-radius:8px; padding:10px 12px; backdrop-filter:blur(8px); min-width:180px; pointer-events:auto;">
            <div style="font-size:.7rem; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:.06em;">Simplify</div>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="range" id="ann2-simplify-slider" min="70" max="100" value="100"
                style="flex:1; accent-color:#a855f7; cursor:pointer;"
                oninput="ann2OnSimplifySlider(this.value)">
              <span id="ann2-simplify-val" style="font-size:.78rem; color:#c4b5fd; min-width:32px; text-align:right;">100%</span>
            </div>
            <button id="ann2-simplify-apply" onclick="ann2ApplySimplify()" disabled
              style="padding:4px 10px; font-size:.75rem; border-radius:5px; background:linear-gradient(135deg,#a855f7,#7c3aed); border:none; color:#fff; cursor:not-allowed; opacity:0.38; transition:opacity .15s;">
              Apply
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- Auto Annotate Settings — Floating Always-Visible Draggable Panel -->
<div id="ann2-auto-settings-modal" style="display:none; position:fixed; right:66px; top:80px; z-index:9000; width:420px; max-width:calc(100vw - 80px); max-height:calc(100vh - 100px); background:var(--bg-secondary); border:1px solid rgba(168,85,247,0.35); border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(168,85,247,0.1); flex-direction:column; overflow:hidden; animation: ann2-popin 0.18s ease-out; user-select:none;">

  <!-- Drag Handle Header -->
  <div id="ann2-auto-settings-header"
    style="padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:rgba(168,85,247,0.08); cursor:grab; flex-shrink:0;"
    onmousedown="ann2StartSettingsDrag(event)">
    <div style="display:flex; align-items:center; gap:8px;">
      <!-- drag grip dots -->
      <svg viewBox="0 0 10 16" style="width:9px;height:14px;fill:rgba(168,85,247,0.5);flex-shrink:0;" title="Drag to move">
        <circle cx="2.5" cy="2.5" r="1.5"/><circle cx="7.5" cy="2.5" r="1.5"/>
        <circle cx="2.5" cy="6.5" r="1.5"/><circle cx="7.5" cy="6.5" r="1.5"/>
        <circle cx="2.5" cy="10.5" r="1.5"/><circle cx="7.5" cy="10.5" r="1.5"/>
        <circle cx="2.5" cy="14.5" r="1.5"/><circle cx="7.5" cy="14.5" r="1.5"/>
      </svg>
      <svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:#a855f7;flex-shrink:0">
        <path d="M7.5,5.6L10,7L8.6,4.5L10,2L7.5,3.4L5,2L6.4,4.5L5,7L7.5,5.6M19.5,15.4L17,14L18.4,16.5L17,19L19.5,17.6L22,19L20.6,16.5L22,14L19.5,15.4M22,2L20.6,4.5L22,7L19.5,5.6L17,7L18.4,4.5L17,2L19.5,3.4L22,2M13.34,12.78L15.78,10.34L13.66,8.22L11.22,10.66L13.34,12.78M14.37,7.29L16.71,9.63C17.1,10 17.1,10.65 16.71,11.04L5.04,22.71C4.65,23.1 4,23.1 3.63,22.71L1.29,20.37C0.9,20 0.9,19.35 1.29,18.96L12.96,7.29C13.35,6.9 14,6.9 14.37,7.29Z" />
      </svg>
      <span style="font-weight:600; font-size:.88rem; color:#c4b5fd; letter-spacing:.01em;">Auto Annotate Settings</span>
    </div>
    <button onclick="ann2CloseAutoSettingsModal()" title="Tutup"
      style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.1rem; line-height:1; padding:4px; border-radius:5px; transition: color .15s; flex-shrink:0;"
      onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='var(--text-muted)'">✕</button>
  </div>

  <!-- Panel Body -->
  <div style="padding:14px 16px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; flex:1; min-height:0;">

    <!-- Confidence & IoU Sliders -->
    <div style="display:flex; flex-direction:column; gap:8px;">
      <label style="font-size:.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em;">Detection Thresholds</label>
      <div style="display:flex; flex-direction:column; gap:5px;">
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="font-size:.78rem; color:var(--text-secondary); min-width:36px;">Conf</span>
          <input type="range" id="ann2-conf-slider" min="1" max="99" value="25"
            style="flex:1; accent-color:#a855f7; cursor:pointer;"
            oninput="ann2MarkSettingsDirty(); document.getElementById('ann2-conf-val').textContent=this.value+'%'">
          <span id="ann2-conf-val" style="font-size:.78rem; color:#c4b5fd; min-width:34px; text-align:right;">25%</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="font-size:.78rem; color:var(--text-secondary); min-width:36px;">IoU</span>
          <input type="range" id="ann2-iou-slider" min="1" max="99" value="85"
            style="flex:1; accent-color:#a855f7; cursor:pointer;"
            oninput="ann2MarkSettingsDirty(); document.getElementById('ann2-iou-val').textContent=this.value+'%'">
          <span id="ann2-iou-val" style="font-size:.78rem; color:#c4b5fd; min-width:34px; text-align:right;">85%</span>
        </div>
      </div>
    </div>

    <!-- Model selection -->
    <div style="display:flex; flex-direction:column; gap:5px;">
      <label style="font-size:.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em;">Model</label>
      <select id="ann2-auto-model" onchange="ann2MarkSettingsDirty()" style="padding:7px 10px; background:var(--bg-tertiary); border:1px solid var(--border); border-radius:7px; color:var(--text-primary); font-family:inherit; font-size:.83rem; cursor:pointer;">
        <option value="sam3">SAM 3</option>
        <option value="sam3.1" selected>SAM 3.1</option>
      </select>
      <div style="display:flex; align-items:center; gap:8px; margin-top:2px;">
        <span style="font-size:.72rem; color:var(--text-muted); white-space:nowrap;">GPU</span>
