<!-- ANNOTATE2: Roboflow-style inline annotation editor -->
<div id="ann2-root" style="display:flex; flex-direction:column; height:100%; min-height:0; position:relative;">

  <!-- Toolbar row -->
  <div id="ann2-toolbar"
    style="display:flex; align-items:center; gap:6px; padding:6px 10px; background:var(--bg-secondary); border-bottom:1px solid var(--border); flex-shrink:0; position:sticky; top:0; z-index:1000;">
    <button class="tog-btn" id="ann2-prev-btn" onclick="ann2Prev()" title="Previous (A)">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor">
        <path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z" />
      </svg>
    </button>
    <span id="ann2-img-counter" style="font-size:.82rem;color:var(--text-secondary);min-width:70px;text-align:center">—
      / —</span>
    <button class="tog-btn" id="ann2-next-btn" onclick="ann2Next()" title="Next (D)">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor">
        <path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z" />
      </svg>
    </button>
    <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>

    <label style="font-size:.78rem;color:var(--text-muted);white-space:nowrap">Class:</label>
    <div style="position:relative; width:160px;">
      <input type="hidden" id="ann2-class-sel" value="">
      <div id="ann2-premium-sel-trigger" onclick="ann2ToggleClassMenu(event)"
        style="display:flex; align-items:center; gap:8px; background:var(--bg-tertiary); border:1px solid rgba(239, 68, 68, 0.4); border-radius:8px; padding:6px 12px; cursor:pointer; box-shadow: 0 0 12px rgba(239, 68, 68, 0.25); transition: all 0.2s;">
        <span id="ann2-class-color-dot"
          style="width:12px; height:12px; border-radius:50%; background:transparent; display:inline-block; border:1px solid rgba(255,255,255,0.1); transition: background 0.15s; flex-shrink:0;"></span>
        <span id="ann2-class-sel-text"
          style="flex:1; font-size:.85rem; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">—
          pilih —</span>
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:var(--text-muted)">
          <path d="M7,10L12,15L17,10H7Z" />
        </svg>
      </div>
      <div id="ann2-premium-sel-menu"
        style="display:none; position:absolute; top:calc(100% + 6px); left:0; width:100%; background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.4); z-index:9999; max-height:250px; overflow-y:auto; flex-direction:column; padding:6px;">
      </div>
    </div>
    <div style="flex:1;"></div>

    <div id="ann2-hint-text"
      style="font-size:.7rem; color:var(--text-muted); margin-right:12px; white-space:nowrap; transition: all 0.15s;">
      Scroll = zoom · H = pan
    </div>

    <label
      style="font-size:.78rem;color:var(--text-muted);white-space:nowrap;display:flex;align-items:center;gap:6px;cursor:pointer;margin-right:12px;user-select:none;">
      <input type="checkbox" id="ann2-autosave-chk" onchange="ann2ToggleAutosave(this.checked)"
        style="cursor:pointer;width:14px;height:14px;margin:0;">
      Autosave
    </label>
    <button class="btn btn-accent" onclick="ann2Save()" id="ann2-save-btn" style="padding:5px 14px;font-size:.82rem;">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:currentColor;margin-right:4px">
        <path
          d="M15,9H5V5H15M12,19A3,3 0 0,1 9,16A3,3 0 0,1 12,13A3,3 0 0,1 15,16A3,3 0 0,1 12,19M17,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V7L17,3Z" />
      </svg>
      Save (Ctrl+S)
    </button>
  </div>

  <!-- Main 3-column layout -->
  <div style="display:flex; flex:1; min-height:0; overflow:hidden;">

    <!-- LEFT PANEL: Annotation list -->
    <div id="ann2-left"
      style="width:215px; min-width:180px; flex-shrink:0; background:var(--bg-secondary); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden;">
      <div
        style="padding:10px 12px 6px; font-size:.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; gap:6px;">
        Annotations
        <span id="ann2-ann-count"
          style="background:var(--bg-tertiary);border-radius:9px;padding:1px 7px;font-size:.68rem;color:var(--text-secondary);">0</span>
      </div>
      <div id="ann2-ann-list" style="flex:0 1 auto; overflow-y:auto; padding:6px 0;"></div>

      <!-- Tags section -->
      <div style="border-top:1px solid var(--border); flex-shrink:0;">
        <div
          style="padding:8px 12px 5px; font-size:.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em;">
          Tags</div>
        <div id="ann2-tags-area" style="padding:0 8px 6px; display:flex; flex-wrap:wrap; gap:4px; min-height:28px;">
        </div>
        <div style="padding:0 8px 10px;">
          <select id="ann2-tag-sel"
            style="width:100%;padding:5px 8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:inherit;font-size:.8rem;box-sizing:border-box;cursor:pointer;"
            onchange="ann2AddSelectedTag(this)">
            <option value="">+ Tambah tag...</option>
          </select>
        </div>
      </div>
    </div>

    <!-- CENTER: Canvas viewport -->
    <div id="ann2-canvas-wrap" style="flex:1; min-width:0; position:relative; overflow:hidden; background:#111827;">
      <canvas id="ann2-canvas" style="position:absolute; top:0; left:0; touch-action:none; cursor:grab;"></canvas>

      <!-- Right-side floating toolbar for tools (Drag, Box, Poly) -->
      <div id="ann2-floating-tools"
        style="position:absolute; top:20px; right:20px; display:flex; flex-direction:column; gap:8px; background:rgba(13,18,34,0.85); border:1px solid var(--border); border-radius:8px; padding:6px; z-index:100; backdrop-filter:blur(6px); box-shadow:var(--shadow);">
        <button class="tog-btn ann2-tool-btn" id="ann2-tool-drag" onclick="ann2SetTool('drag')"
          title="Drag/Pan Canvas (H) - Pindahkan canvas dengan klik & seret"
          style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
            <path
              d="M13,6V11H18V7.75L22.25,12L18,16.25V13H13V18H16.25L12,22.25L7.75,18H11V13H6V16.25L1.75,12L6,7.75V11H11V6H7.75L12,1.75L16.25,6H13Z" />
          </svg>
        </button>
        <button class="tog-btn ann2-tool-btn" id="ann2-tool-bbox" onclick="ann2SetTool('bbox')"
          title="Bounding Box (B) - Buat kotak pembatas objek"
          style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
            <path
              d="M4,6H6V4H4M4,14H6V12H4M4,18H6V16H4M4,10H6V8H4M8,4V6H10V4M12,4V6H14V4M18,4H16V6H18V8H20V6A2,2 0 0,0 18,4M8,20V18H10V20M20,16H18V18H16V20H18A2,2 0 0,0 20,18V16M20,8H18V10H20M20,12H18V14H20M12,20V18H14V20M4,22H6V20H4A2,2 0 0,1 2,18V16H4V18H6V20H4V22M2,6V4A2,2 0 0,1 4,2H6V4H4V6H2Z" />
          </svg>
        </button>
        <button class="tog-btn ann2-tool-btn" id="ann2-tool-polygon" onclick="ann2SetTool('polygon')"
          title="Polygon (P) - Buat anotasi segmentasi poligon"
          style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
            <path
              d="M2,2H8V4.26L14.74,8H18V10L22,14L18.93,17.07L16,14.14V16H13.26L10,19.26V22H4V16H6.74L10,12.74V10.26L3.26,8H2V2M4,4V6H5.74L12.74,9.26V13L10,15.74V18H6V14.26L2.74,11H2H4V10V4M14,2H22V10H14V2M16,4V8H20V4H16M4,18H8V22H4V18Z" />
          </svg>
        </button>
        <button class="tog-btn ann2-tool-btn" id="ann2-tool-edit" onclick="ann2SetTool('edit')"
          title="Edit Mode (E) - Edit dan geser anotasi serta titik kontrol"
          style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
            <path
              d="M13.64,21.97C13.14,22.21 12.54,22 12.31,21.5L10.13,16.76L7.62,19.27C7.23,19.66 6.58,19.66 6.19,19.27C6,19.08 5.9,18.83 5.9,18.57V3.5C5.9,2.95 6.35,2.5 6.9,2.5C7.16,2.5 7.41,2.6 7.6,2.79L18.58,13.77C18.97,14.16 18.97,14.81 18.58,15.2C18.39,15.39 18.14,15.49 17.88,15.49H14.88L17.07,20.23C17.3,20.73 17.1,21.33 16.6,21.56L13.64,21.97Z" />
          </svg>
        </button>
        <div style="width:28px;height:1px;background:var(--border);margin:2px auto;"></div>
        <button class="tog-btn ann2-tool-btn" id="ann2-tool-magic" onclick="ann2SetTool('magic')"
          title="Magic Selection (M) - SAM 3.1 point-to-segment&#10;Click = positive point&#10;Ctrl+Click = negative point&#10;Enter = konfirmasi · Esc = batal"
          style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer; position:relative;">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
            <path
              d="M7.5,5.6L10,7L8.6,4.5L10,2L7.5,3.4L5,2L6.4,4.5L5,7L7.5,5.6M19.5,15.4L17,14L18.4,16.5L17,19L19.5,17.6L22,19L20.6,16.5L22,14L19.5,15.4M22,2L20.6,4.5L22,7L19.5,5.6L17,7L18.4,4.5L17,2L19.5,3.4L22,2M13.34,12.78L15.78,10.34L13.66,8.22L11.22,10.66L13.34,12.78M14.37,7.29L16.71,9.63C17.1,10 17.1,10.65 16.71,11.04L5.04,22.71C4.65,23.1 4,23.1 3.63,22.71L1.29,20.37C0.9,20 0.9,19.35 1.29,18.96L12.96,7.29C13.35,6.9 14,6.9 14.37,7.29Z" />
          </svg>
        </button>
      </div>


    </div>
  </div>
</div>

<style>
  .ann2-tool-btn.active-tool {
    background: var(--accent) !important;
    color: #fff !important;
    border-color: var(--accent) !important;
  }

  .ann2-ann-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 5px;
    margin: 1px 6px;
    font-size: .82rem;
    transition: background .12s;
    user-select: none;
    border: 1px solid transparent;
  }

  .ann2-ann-item:hover {
    background: var(--bg-tertiary);
  }

  .ann2-ann-item.ann2-selected {
    background: rgba(99, 102, 241, .18);
    border-color: rgba(99, 102, 241, .35);
  }

  .ann2-ann-item.ann2-locked {
    opacity: .55;
  }

  .ann2-ann-item.dragging {
    opacity: 0.4;
    background: var(--bg-tertiary);
    border: 1px dashed var(--border);
  }

  .ann2-icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    border-radius: 3px;
    flex-shrink: 0;
    transition: color .12s, background .12s;
  }

  .ann2-icon-btn:hover {
    color: var(--text-primary);
    background: rgba(255, 255, 255, .08);
  }

  .ann2-del-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px;
    display: flex;
    align-items: center;
    border-radius: 3px;
    flex-shrink: 0;
    color: var(--text-muted);
    transition: color .12s;
  }

  .ann2-del-btn:hover {
    color: var(--danger);
  }

  .ann2-tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px;
    background: rgba(99, 102, 241, .15);
    border: 1px solid rgba(99, 102, 241, .28);
    border-radius: 12px;
    font-size: .74rem;
    color: var(--accent-light);
  }

  .ann2-tag-chip button {
    background: none;
    border: none;
    color: var(--accent-light);
    cursor: pointer;
    padding: 0;
    font-size: .9rem;
    line-height: 1;
    opacity: .7;
  }

  .ann2-tag-chip button:hover {
    opacity: 1;
  }

  .ann2-sug-item {
    padding: 6px 10px;
    font-size: .82rem;
    cursor: pointer;
    color: var(--text-secondary);
    transition: background .1s;
  }

  .ann2-sug-item:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }

  /* Magic Selection */
  #ann2-tool-magic.active-tool {
    background: linear-gradient(135deg, #7c3aed, #4f46e5) !important;
    box-shadow: 0 0 12px rgba(124, 58, 237, 0.6) !important;
  }

  #ann2-magic-overlay {
    pointer-events: none;
    position: absolute;
    inset: 0;
    z-index: 50;
  }

  .ann2-magic-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #fff;
    border: 1.5px solid rgba(0, 0, 0, 0.4);
  }
</style>

<script src="/annotate2.js"></script>
