<!-- ANNOTATE2: Roboflow-style inline annotation editor -->
<div id="ann2-root" style="display:flex; flex-direction:column; height:100%; min-height:0; position:relative;">

  <!-- Toolbar row -->
  <div id="ann2-toolbar" style="display:flex; align-items:center; gap:6px; padding:6px 10px; background:var(--bg-secondary); border-bottom:1px solid var(--border); flex-shrink:0;">
    <button class="tog-btn" id="ann2-prev-btn" onclick="ann2Prev()" title="Previous (A)">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z"/></svg>
    </button>
    <span id="ann2-img-counter" style="font-size:.82rem;color:var(--text-secondary);min-width:70px;text-align:center">— / —</span>
    <button class="tog-btn" id="ann2-next-btn" onclick="ann2Next()" title="Next (D)">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
    </button>
    <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>
    
    <label style="font-size:.78rem;color:var(--text-muted);white-space:nowrap">Class:</label>
    <select id="ann2-class-sel" style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:.82rem;padding:4px 8px;cursor:pointer;">
      <option value="">— pilih —</option>
    </select>
    <div style="flex:1;"></div>
    <button class="btn btn-accent" onclick="ann2Save()" id="ann2-save-btn" style="padding:5px 14px;font-size:.82rem;">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:currentColor;margin-right:4px"><path d="M15,9H5V5H15M12,19A3,3 0 0,1 9,16A3,3 0 0,1 12,13A3,3 0 0,1 15,16A3,3 0 0,1 12,19M17,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V7L17,3Z"/></svg>
      Save (Ctrl+S)
    </button>
  </div>

  <!-- Main 3-column layout -->
  <div style="display:flex; flex:1; min-height:0; overflow:hidden;">

    <!-- LEFT PANEL: Annotation list -->
    <div id="ann2-left" style="width:215px; min-width:180px; flex-shrink:0; background:var(--bg-secondary); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden;">
      <div style="padding:10px 12px 6px; font-size:.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; gap:6px;">
        Annotations
        <span id="ann2-ann-count" style="background:var(--bg-tertiary);border-radius:9px;padding:1px 7px;font-size:.68rem;color:var(--text-secondary);">0</span>
      </div>
      <div id="ann2-ann-list" style="flex:1; overflow-y:auto; padding:6px 0;"></div>

      <!-- Tags section -->
      <div style="border-top:1px solid var(--border); flex-shrink:0;">
        <div style="padding:8px 12px 5px; font-size:.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em;">Tags</div>
        <div id="ann2-tags-area" style="padding:0 8px 6px; display:flex; flex-wrap:wrap; gap:4px; min-height:28px;"></div>
        <div style="padding:0 8px 10px; position:relative;">
          <input type="text" id="ann2-tag-input" placeholder="Tambah tag..."
            style="width:100%;padding:5px 8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:inherit;font-size:.8rem;box-sizing:border-box;"
            oninput="ann2FilterTagSuggestions(this.value)"
            onkeydown="ann2TagKeydown(event)">
          <div id="ann2-tag-suggestions" style="display:none;position:absolute;bottom:100%;left:8px;right:8px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;max-height:120px;overflow-y:auto;z-index:200;box-shadow:var(--shadow);margin-bottom:2px;"></div>
        </div>
      </div>
    </div>

    <!-- CENTER: Canvas viewport -->
    <div id="ann2-canvas-wrap" style="flex:1; min-width:0; position:relative; overflow:hidden; background:#111827;">
      <canvas id="ann2-canvas" style="position:absolute; top:0; left:0; touch-action:none; cursor:grab;"></canvas>
      
      <!-- Right-side floating toolbar for tools (Drag, Box, Poly) -->
      <div id="ann2-floating-tools" style="position:absolute; top:20px; right:20px; display:flex; flex-direction:column; gap:8px; background:rgba(13,18,34,0.85); border:1px solid var(--border); border-radius:8px; padding:6px; z-index:100; backdrop-filter:blur(6px); box-shadow:var(--shadow);">
        <button class="tog-btn ann2-tool-btn" id="ann2-tool-drag" onclick="ann2SetTool('drag')" title="Drag/Pan Canvas (H) - Pindahkan canvas dengan klik & seret" style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M13,6V11H18V7.75L22.25,12L18,16.25V13H13V18H16.25L12,22.25L7.75,18H11V13H6V16.25L1.75,12L6,7.75V11H11V6H7.75L12,1.75L16.25,6H13Z"/></svg>
        </button>
        <button class="tog-btn ann2-tool-btn" id="ann2-tool-bbox" onclick="ann2SetTool('bbox')" title="Bounding Box (B) - Buat kotak pembatas objek" style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M4,6H6V4H4M4,14H6V12H4M4,18H6V16H4M4,10H6V8H4M8,4V6H10V4M12,4V6H14V4M18,4H16V6H18V8H20V6A2,2 0 0,0 18,4M8,20V18H10V20M20,16H18V18H16V20H18A2,2 0 0,0 20,18V16M20,8H18V10H20M20,12H18V14H20M12,20V18H14V20M4,22H6V20H4A2,2 0 0,1 2,18V16H4V18H6V20H4V22M2,6V4A2,2 0 0,1 4,2H6V4H4V6H2Z"/></svg>
        </button>
        <button class="tog-btn ann2-tool-btn" id="ann2-tool-polygon" onclick="ann2SetTool('polygon')" title="Polygon (P) - Buat anotasi segmentasi poligon" style="width:36px; height:36px; padding:0; display:flex; justify-content:center; align-items:center; border-radius:6px; border:none; cursor:pointer;">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M2,2H8V4.26L14.74,8H18V10L22,14L18.93,17.07L16,14.14V16H13.26L10,19.26V22H4V16H6.74L10,12.74V10.26L3.26,8H2V2M4,4V6H5.74L12.74,9.26V13L10,15.74V18H6V14.26L2.74,11H2H4V10V4M14,2H22V10H14V2M16,4V8H20V4H16M4,18H8V22H4V18Z"/></svg>
        </button>
      </div>

      <div id="ann2-poly-hint" style="display:none; position:absolute; bottom:12px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.72); color:#fff; font-size:.78rem; padding:5px 14px; border-radius:20px; pointer-events:none; white-space:nowrap; z-index:90;">
        Click to add points · Enter = close · Esc = cancel
      </div>
      <div style="position:absolute; bottom:10px; right:10px; font-size:.7rem; color:rgba(255,255,255,.35); pointer-events:none; z-index:90;">
        Scroll = zoom · H = pan
      </div>
    </div>
  </div>
</div>

<style>
.ann2-tool-btn.active-tool { background:var(--accent) !important; color:#fff !important; border-color:var(--accent) !important; }
.ann2-ann-item { display:flex; align-items:center; gap:5px; padding:5px 8px; cursor:pointer; border-radius:5px; margin:1px 6px; font-size:.82rem; transition:background .12s; user-select:none; border:1px solid transparent; }
.ann2-ann-item:hover { background:var(--bg-tertiary); }
.ann2-ann-item.ann2-selected { background:rgba(99,102,241,.18); border-color:rgba(99,102,241,.35); }
.ann2-ann-item.ann2-locked { opacity:.55; }
.ann2-icon-btn { background:none; border:none; cursor:pointer; padding:2px; color:var(--text-muted); display:flex; align-items:center; border-radius:3px; flex-shrink:0; transition:color .12s, background .12s; }
.ann2-icon-btn:hover { color:var(--text-primary); background:rgba(255,255,255,.08); }
.ann2-del-btn { background:none; border:none; cursor:pointer; padding:2px; display:flex; align-items:center; border-radius:3px; flex-shrink:0; color:transparent; transition:color .12s; }
.ann2-ann-item:hover .ann2-del-btn { color:var(--danger); }
.ann2-tag-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 7px; background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.28); border-radius:12px; font-size:.74rem; color:var(--accent-light); }
.ann2-tag-chip button { background:none; border:none; color:var(--accent-light); cursor:pointer; padding:0; font-size:.9rem; line-height:1; opacity:.7; }
.ann2-tag-chip button:hover { opacity:1; }
.ann2-sug-item { padding:6px 10px; font-size:.82rem; cursor:pointer; color:var(--text-secondary); transition:background .1s; }
.ann2-sug-item:hover { background:var(--bg-tertiary); color:var(--text-primary); }
</style>

<script>
(function() {
  'use strict';

  // ── State ──
  let _ds = null;
  let _images = [];
  let _idx = 0;
  let _imgEl = null;
  let _anns = [];        // [{class_id, points, type:'bbox'|'polygon', locked}]
  let _selIdx = -1;
  let _tool = 'drag';
  let _tags = [];
  let _curTags = [];
  let _datasetType = 'object_detection'; // default setting

  // Canvas transform
  let _pan = {x:0, y:0};
  let _scale = 1;

  // Interaction state
  let _panning = false, _panStart = null;
  let _drawing = false, _drawStart = null;
  let _polyPts = [];
  let _mouseImg = null;
  let _dragAnn = false, _dragAnnStart = null, _dragAnnOrig = null;
  let _dragCorner = -1, _dragCornerOrig = null;

  const MIN_BBOX = 0.005;

  // ── Public init ──
  window.initAnn2 = function(dsState, imgList) {
    _ds = dsState;
    _images = imgList || [];
    _idx = 0;
    _buildClassSel();
    
    // Fetch settings first to configure tools based on Dataset Type
    Promise.all([_fetchTags(), _fetchDatasetSettings()]).then(() => {
      _setTool('drag');
      _setupCanvas();
      _setupKeys();
      if (_images.length > 0) _loadImg(0);
      else _drawEmpty();
    });
  };

  async function _fetchDatasetSettings() {
    try {
      const r = await fetch('/api/llm-settings');
      if (r.ok) {
        const s = await r.json();
        _datasetType = s.dataset_type || 'object_detection';
      }
    } catch(e) {
      _datasetType = 'object_detection';
    }
    
    // Visually disable or hide restricted buttons
    const btnBbox = document.getElementById('ann2-tool-bbox');
    const btnPoly = document.getElementById('ann2-tool-polygon');
    
    if (_datasetType === 'segment') {
      if (btnBbox) btnBbox.style.display = 'none';
      if (btnPoly) btnPoly.style.display = 'flex';
    } else {
      if (btnBbox) btnBbox.style.display = 'flex';
      if (btnPoly) btnPoly.style.display = 'none';
    }
  }

  function _buildClassSel() {
    const sel = document.getElementById('ann2-class-sel');
    if (!sel || !_ds) return;
    sel.innerHTML = '<option value="">— pilih —</option>';
    (_ds.classes?.names || []).forEach((n, i) => {
      const o = document.createElement('option');
      o.value = i; o.textContent = n;
      sel.appendChild(o);
    });
  }

  async function _fetchTags() {
    try { const r = await fetch('/api/tags'); _tags = await r.json(); }
    catch(e) { _tags = []; }
  }

  function _drawEmpty() {
    const c = document.getElementById('ann2-canvas');
    const w = document.getElementById('ann2-canvas-wrap');
    if (!c || !w) return;
    c.width = w.clientWidth; c.height = w.clientHeight;
    const ctx = c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.font = '15px Outfit,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No images in annotate/ folder', c.width/2, c.height/2);
  }

  // ── Image Loading ──
  async function _loadImg(idx) {
    _idx = Math.max(0, Math.min(idx, _images.length-1));
    const imgObj = _images[_idx];
    _anns = (imgObj.annotations||[]).map(a => ({
      class_id: a.class_id,
      points: a.points.map(p=>[...p]),
      type: a.points.length===2 ? 'bbox' : 'polygon',
      locked: false
    }));
    _selIdx = -1;
    const ctr = document.getElementById('ann2-img-counter');
    if (ctr) ctr.textContent = `${_idx+1} / ${_images.length}`;
    await _fetchImgTags(imgObj.filename);
    _renderTagsArea();
    _imgEl = new Image();
    _imgEl.onload = () => { _fitImg(); _redraw(); _renderAnnList(); };
    _imgEl.onerror = () => { _imgEl = null; _redraw(); };
    _imgEl.src = `/dataset/${encodeURIComponent(_ds.name)}/annotate/images/${encodeURIComponent(imgObj.filename)}`;
  }

  async function _fetchImgTags(filename) {
    try {
      const r = await fetch(`/api/dataset/${encodeURIComponent(_ds.name)}/image-tags/${encodeURIComponent(filename)}`);
      _curTags = r.ok ? (await r.json()).tags || [] : [];
    } catch(e) { _curTags = []; }
  }

  function _fitImg() {
    const wrap = document.getElementById('ann2-canvas-wrap');
    const c = document.getElementById('ann2-canvas');
    if (!wrap || !c || !_imgEl || !_imgEl.naturalWidth || !_imgEl.naturalHeight) return;
    c.width = wrap.clientWidth; c.height = wrap.clientHeight;
    const sx = c.width/_imgEl.naturalWidth, sy = c.height/_imgEl.naturalHeight;
    _scale = Math.min(sx, sy) * 0.92;
    _pan.x = (c.width - _imgEl.naturalWidth*_scale)/2;
    _pan.y = (c.height - _imgEl.naturalHeight*_scale)/2;
  }

  // ── Canvas Setup ──
  function _setupCanvas() {
    const c = document.getElementById('ann2-canvas');
    const wrap = document.getElementById('ann2-canvas-wrap');
    if (!c || !wrap) return;
    new ResizeObserver(() => { if(_imgEl){_fitImg();_redraw();} else {c.width=wrap.clientWidth;c.height=wrap.clientHeight;} }).observe(wrap);
    c.addEventListener('mousedown', _onDown);
    c.addEventListener('mousemove', _onMove);
    c.addEventListener('mouseup', _onUp);
    c.addEventListener('mouseleave', _onLeave);
    c.addEventListener('wheel', _onWheel, {passive:false});
    c.addEventListener('dblclick', _onDbl);
    c.addEventListener('contextmenu', e => { e.preventDefault(); if(_tool==='polygon') _cancelPoly(); });
    document.addEventListener('click', e => {
      const sug = document.getElementById('ann2-tag-suggestions');
      const inp = document.getElementById('ann2-tag-input');
      if (sug && !sug.contains(e.target) && e.target!==inp) sug.style.display='none';
    });
  }

  function _setupKeys() {
    document.addEventListener('keydown', e => {
      const root = document.getElementById('ann2-root');
      if (!root || root.closest('[style*="display:none"]')) return;
      const tag = e.target.tagName.toLowerCase();
      if (tag==='input'||tag==='textarea'||tag==='select') return;
      const k = e.key;
      if (k==='h'||k==='H') _setTool('drag');
      if ((k==='b'||k==='B') && _datasetType !== 'segment') _setTool('bbox');
      if ((k==='p'||k==='P') && _datasetType !== 'object_detection') _setTool('polygon');
      if (k==='ArrowLeft'||k==='a'||k==='A') ann2Prev();
      if (k==='ArrowRight'||k==='d'||k==='D') ann2Next();
      if ((e.ctrlKey||e.metaKey)&&k==='s') { e.preventDefault(); ann2Save(); }
      if (k==='Enter'&&_tool==='polygon'&&_polyPts.length>=3) _closePoly();
      if (k==='Escape') { if(_tool==='polygon') _cancelPoly(); _selIdx=-1; _redraw(); _renderAnnList(); }
      if ((k==='Delete'||k==='Backspace')&&_selIdx>=0&&!_anns[_selIdx]?.locked) {
        _anns.splice(_selIdx,1); _selIdx=-1; _redraw(); _renderAnnList();
      }
    });
  }

  // ── Tool ──
  function _setTool(t) {
    if (t === 'bbox' && _datasetType === 'segment') return;
    if (t === 'polygon' && _datasetType === 'object_detection') return;
    
    _cancelPoly();
    _drawing=false; _polyPts=[];
    _tool=t;
    document.querySelectorAll('.ann2-tool-btn').forEach(b=>b.classList.remove('active-tool'));
    const btn=document.getElementById(`ann2-tool-${t}`);
    if(btn) btn.classList.add('active-tool');
    const c=document.getElementById('ann2-canvas');
    if(c) c.style.cursor=t==='drag'?'grab':'crosshair';
    const ph=document.getElementById('ann2-poly-hint');
    if(ph) ph.style.display='none';
  }
  window.ann2SetTool = _setTool;

  // ── Coords ──
  function _c2i(cx,cy) {
    if(!_imgEl || !_imgEl.naturalWidth || !_imgEl.naturalHeight || !_scale) return {x:0,y:0};
    return {x:(cx-_pan.x)/(_imgEl.naturalWidth*_scale), y:(cy-_pan.y)/(_imgEl.naturalHeight*_scale)};
  }
  function _i2c(ix,iy) {
    if(!_imgEl) return {x:0,y:0};
    return {x:ix*_imgEl.naturalWidth*_scale+_pan.x, y:iy*_imgEl.naturalHeight*_scale+_pan.y};
  }
  function _clp(v){return Math.max(0,Math.min(1,v));}

  // ── Hit ──
  function _hitTest(ix,iy) {
    for(let i=_anns.length-1;i>=0;i--) {
      const a=_anns[i]; if(a.locked) continue;
      if(a.type==='bbox'){
        const [[x1,y1],[x2,y2]]=a.points;
        if(ix>=Math.min(x1,x2)&&ix<=Math.max(x1,x2)&&iy>=Math.min(y1,y2)&&iy<=Math.max(y1,y2)) return i;
      } else {
        if(_ptInPoly(ix,iy,a.points)) return i;
      }
    }
    return -1;
  }
  function _hitCorner(cx,cy,ann) {
    if(ann.type!=='bbox'||ann.points.length<2) return -1;
    const [[x1,y1],[x2,y2]]=ann.points;
    const corners=[_i2c(Math.min(x1,x2),Math.min(y1,y2)),_i2c(Math.max(x1,x2),Math.min(y1,y2)),_i2c(Math.max(x1,x2),Math.max(y1,y2)),_i2c(Math.min(x1,x2),Math.max(y1,y2))];
    for(let i=0;i<corners.length;i++){const dx=cx-corners[i].x,dy=cy-corners[i].y;if(dx*dx+dy*dy<=64) return i;}
    return -1;
  }
  function _ptInPoly(px,py,pts) {
    let inside=false;
    for(let i=0,j=pts.length-1;i<pts.length;j=i++){
      const xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
      if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
    }
    return inside;
  }

  // ── Mouse Handlers ──
  function _onDown(e) {
    if(e.button!==0) return;
    const rect=e.target.getBoundingClientRect();
    const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
    const ip=_c2i(cx,cy);

    if(_tool==='drag') {
      _panning=true; _panStart={mx:cx,my:cy,px:_pan.x,py:_pan.y};
      e.target.style.cursor='grabbing'; return;
    }
    if(_tool==='bbox'&&_selIdx>=0&&_anns[_selIdx]) {
      const ci=_hitCorner(cx,cy,_anns[_selIdx]);
      if(ci>=0) { _dragCorner=ci; _dragCornerOrig=_anns[_selIdx].points.map(p=>[...p]); return; }
    }
    if(_tool!=='polygon') {
      const hi=_hitTest(ip.x,ip.y);
      if(hi>=0) {
        _selIdx=hi;
        if(!_anns[hi].locked) { _dragAnn=true; _dragAnnStart={x:ip.x,y:ip.y}; _dragAnnOrig=_anns[hi].points.map(p=>[...p]); }
        _redraw(); _renderAnnList(); return;
      }
      if(_tool==='drag') { _selIdx=-1; _redraw(); _renderAnnList(); return; }
    }
    const cid=parseInt(document.getElementById('ann2-class-sel')?.value);
    if(isNaN(cid)||!_ds?.classes?.names[cid]) { _selIdx=-1; _redraw(); _renderAnnList(); return; }
    if(_tool==='bbox') { _drawing=true; _drawStart={x:_clp(ip.x),y:_clp(ip.y)}; return; }
    if(_tool==='polygon') {
      if(!_drawing) { _drawing=true; _polyPts=[]; const ph=document.getElementById('ann2-poly-hint'); if(ph) ph.style.display=''; }
      _polyPts.push([_clp(ip.x),_clp(ip.y)]); _redraw(); return;
    }
  }

  function _onMove(e) {
    const rect=e.target.getBoundingClientRect();
    const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
    const ip=_c2i(cx,cy);
    _mouseImg=ip;
    if(_panning&&_panStart) { _pan.x=_panStart.px+(cx-_panStart.mx); _pan.y=_panStart.py+(cy-_panStart.my); _redraw(); return; }
    if(_dragCorner>=0&&_dragCornerOrig&&_selIdx>=0) {
      const a=_anns[_selIdx]; if(!a||a.locked) return;
      const o=_dragCornerOrig, np=o.map(p=>[...p]);
      const ix=_clp(ip.x),iy=_clp(ip.y);
      if(_dragCorner===0){np[0]=[ix,iy];}
      else if(_dragCorner===1){np[0]=[o[0][0],iy];np[1]=[ix,o[1][1]];}
      else if(_dragCorner===2){np[1]=[ix,iy];}
      else if(_dragCorner===3){np[0]=[ix,o[0][1]];np[1]=[o[1][0],iy];}
      a.points=np; _redraw(); return;
    }
    if(_dragAnn&&_dragAnnStart&&_dragAnnOrig&&_selIdx>=0) {
      const dx=ip.x-_dragAnnStart.x, dy=ip.y-_dragAnnStart.y;
      _anns[_selIdx].points=_dragAnnOrig.map(p=>[_clp(p[0]+dx),_clp(p[1]+dy)]);
      _redraw(); return;
    }
    if(_drawing) _redraw();
    if(_tool==='bbox'&&_selIdx>=0&&_anns[_selIdx]&&_anns[_selIdx].type==='bbox'&&!_anns[_selIdx].locked) {
      const ci=_hitCorner(cx,cy,_anns[_selIdx]);
      e.target.style.cursor=ci>=0?['nw-resize','ne-resize','se-resize','sw-resize'][ci]:'crosshair';
    }
  }

  function _onUp(e) {
    if(_panning){_panning=false;e.target.style.cursor='grab';return;}
    if(_dragCorner>=0){_dragCorner=-1;_dragCornerOrig=null;return;}
    if(_dragAnn){_dragAnn=false;_dragAnnStart=null;_dragAnnOrig=null;return;}
    if(_drawing&&_tool==='bbox'&&_drawStart&&_mouseImg) {
      const x1=Math.min(_drawStart.x,_clp(_mouseImg.x)), y1=Math.min(_drawStart.y,_clp(_mouseImg.y));
      const x2=Math.max(_drawStart.x,_clp(_mouseImg.x)), y2=Math.max(_drawStart.y,_clp(_mouseImg.y));
      if((x2-x1)>MIN_BBOX&&(y2-y1)>MIN_BBOX) {
        const cid=parseInt(document.getElementById('ann2-class-sel')?.value);
        if(!isNaN(cid)&&_ds?.classes?.names[cid]) {
          _anns.push({class_id:cid,points:[[x1,y1],[x2,y2]],type:'bbox',locked:false});
          _selIdx=_anns.length-1; _renderAnnList();
        }
      }
      _drawing=false; _drawStart=null; _redraw();
    }
  }

  function _onLeave(e) {
    if(_panning){_panning=false;e.target.style.cursor=_tool==='drag'?'grab':'crosshair';}
    _mouseImg=null; if(_drawing) _redraw();
  }

  function _onDbl() { if(_tool==='polygon'&&_polyPts.length>=3) _closePoly(); }

  function _onWheel(e) {
    e.preventDefault();
    const rect=e.target.getBoundingClientRect();
    const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
    const f=e.deltaY<0?1.12:1/1.12;
    const ns=Math.max(0.05,Math.min(20,_scale*f));
    const r=ns/_scale;
    _pan.x=cx-r*(cx-_pan.x); _pan.y=cy-r*(cy-_pan.y);
    _scale=ns; _redraw();
  }

  // ── Polygon ──
  function _closePoly() {
    if(_polyPts.length<3){_cancelPoly();return;}
    const cid=parseInt(document.getElementById('ann2-class-sel')?.value);
    if(!isNaN(cid)&&_ds?.classes?.names[cid]) {
      _anns.push({class_id:cid,points:_polyPts.map(p=>[...p]),type:'polygon',locked:false});
      _selIdx=_anns.length-1; _renderAnnList();
    }
    _cancelPoly();
  }
  function _cancelPoly() {
    _drawing=false; _polyPts=[];
    const ph=document.getElementById('ann2-poly-hint'); if(ph) ph.style.display='none';
    _redraw();
  }

  // ── Redraw ──
  function _redraw() {
    const canvas=document.getElementById('ann2-canvas');
    if(!canvas) return;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(!_imgEl || !_imgEl.naturalWidth || !_imgEl.naturalHeight) return;
    ctx.drawImage(_imgEl,_pan.x,_pan.y,_imgEl.naturalWidth*_scale,_imgEl.naturalHeight*_scale);

    _anns.forEach((ann,idx)=>{
      const sel=idx===_selIdx;
      const col=_clsColor(ann.class_id);
      ctx.save();
      ctx.globalAlpha=ann.locked?0.4:(sel?1:0.78);
      ctx.strokeStyle=col; ctx.lineWidth=sel?2.5:1.5;
      if(ann.type==='bbox') {
        const [[x1,y1],[x2,y2]]=ann.points;
        const c1=_i2c(Math.min(x1,x2),Math.min(y1,y2)), c2=_i2c(Math.max(x1,x2),Math.max(y1,y2));
        ctx.strokeRect(c1.x,c1.y,c2.x-c1.x,c2.y-c1.y);
        ctx.fillStyle=col+'22'; ctx.fillRect(c1.x,c1.y,c2.x-c1.x,c2.y-c1.y);
        if(sel&&!ann.locked) {
          [[c1.x,c1.y],[c2.x,c1.y],[c2.x,c2.y],[c1.x,c2.y]].forEach(([px,py])=>{
            ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
          });
        }
      } else {
        if(ann.points.length>=2) {
          ctx.beginPath();
          ann.points.forEach((p,pi)=>{const c=_i2c(p[0],p[1]); pi===0?ctx.moveTo(c.x,c.y):ctx.lineTo(c.x,c.y);});
          ctx.closePath(); ctx.stroke();
          ctx.fillStyle=col+'22'; ctx.fill();
          if(sel&&!ann.locked) ann.points.forEach(p=>{
            const c=_i2c(p[0],p[1]);
            ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(c.x,c.y,4,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
          });
        }
      }
      // Label
      const lp=ann.type==='bbox'?[Math.min(ann.points[0][0],ann.points[1][0]),Math.min(ann.points[0][1],ann.points[1][1])]:ann.points[0]&&[ann.points[0][0],ann.points[0][1]];
      if(lp) {
        const lc=_i2c(lp[0],lp[1]);
        const nm=_ds?.classes?.names[ann.class_id]||`#${ann.class_id}`;
        ctx.globalAlpha=1; ctx.font='bold 11px Outfit,sans-serif';
        const tw=ctx.measureText(nm).width;
        ctx.fillStyle=col; ctx.fillRect(lc.x,lc.y-14,tw+8,15);
        ctx.fillStyle='#fff'; ctx.fillText(nm,lc.x+4,lc.y-2);
      }
      ctx.restore();
    });

    // In-progress bbox
    if(_drawing&&_tool==='bbox'&&_drawStart&&_mouseImg) {
      const c1=_i2c(_drawStart.x,_drawStart.y), c2=_i2c(_clp(_mouseImg.x),_clp(_mouseImg.y));
      ctx.save(); ctx.strokeStyle=_selColor(); ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
      ctx.strokeRect(Math.min(c1.x,c2.x),Math.min(c1.y,c2.y),Math.abs(c2.x-c1.x),Math.abs(c2.y-c1.y));
      ctx.restore();
    }

    // In-progress polygon
    if(_drawing&&_tool==='polygon'&&_polyPts.length>0) {
      const col=_selColor();
      ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
      ctx.beginPath();
      _polyPts.forEach((p,pi)=>{const c=_i2c(p[0],p[1]); pi===0?ctx.moveTo(c.x,c.y):ctx.lineTo(c.x,c.y);});
      if(_mouseImg){const mc=_i2c(_clp(_mouseImg.x),_clp(_mouseImg.y)); ctx.lineTo(mc.x,mc.y);}
      ctx.stroke(); ctx.setLineDash([]);
      _polyPts.forEach((p,pi)=>{
        const c=_i2c(p[0],p[1]);
        ctx.fillStyle=pi===0?'#fff':col; ctx.beginPath(); ctx.arc(c.x,c.y,pi===0?5:3.5,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
      });
      ctx.restore();
    }
  }

  function _clsColor(id) {
    if(_ds?.classes?.color&&_ds.classes.color[id]) return _ds.classes.color[id];
    return ['#6366f1','#ef4444','#f59e0b','#10b981','#06b6d4','#a855f7'][id%6];
  }
  function _selColor() {
    const cid=parseInt(document.getElementById('ann2-class-sel')?.value);
    return isNaN(cid)?'#6366f1':_clsColor(cid);
  }

  // ── Ann List ──
  function _renderAnnList() {
    const list=document.getElementById('ann2-ann-list');
    const cntEl=document.getElementById('ann2-ann-count');
    if(!list) return;
    if(cntEl) cntEl.textContent=_anns.length;
    list.innerHTML='';
    _anns.forEach((ann,idx)=>{
      const col=_clsColor(ann.class_id);
      const name=_ds?.classes?.names[ann.class_id]||`#${ann.class_id}`;
      const item=document.createElement('div');
      item.className='ann2-ann-item'+(idx===_selIdx?' ann2-selected':'')+(ann.locked?' ann2-locked':'');
      item.onclick=()=>{_selIdx=idx;_redraw();_renderAnnList();};
      const dot=document.createElement('span');
      dot.style.cssText=`width:9px;height:9px;border-radius:2px;background:${col};flex-shrink:0;display:inline-block;`;
      const typeEl=document.createElement('span');
      typeEl.style.cssText='color:var(--text-muted);font-size:.68rem;flex-shrink:0;';
      typeEl.textContent=ann.type==='bbox'?'▭':'⬡';
      const nameEl=document.createElement('span');
      nameEl.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
      nameEl.textContent=name;
      const lockBtn=document.createElement('button');
      lockBtn.className='ann2-icon-btn'; lockBtn.title=ann.locked?'Unlock':'Lock';
      lockBtn.innerHTML=ann.locked
        ?'<svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:currentColor"><path d="M18,8A2,2 0 0,1 20,10V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V10C4,8.89 4.9,8 6,8H15V6A3,3 0 0,0 12,3A3,3 0 0,0 9,6H7A5,5 0 0,1 12,1A5,5 0 0,1 17,6V8H18M12,17A2,2 0 0,0 14,15A2,2 0 0,0 12,13A2,2 0 0,0 10,15A2,2 0 0,0 12,17Z"/></svg>'
        :'<svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:currentColor"><path d="M18,8A2,2 0 0,1 20,10V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V10A2,2 0 0,1 6,8H13V6A3,3 0 0,0 10,3A3,3 0 0,0 7,6H5A5,5 0 0,1 10,1A5,5 0 0,1 15,6V8H18M12,17A2,2 0 0,0 14,15A2,2 0 0,0 12,13A2,2 0 0,0 10,15A2,2 0 0,0 12,17Z"/></svg>';
      lockBtn.onclick=ev=>{ev.stopPropagation();ann.locked=!ann.locked;_redraw();_renderAnnList();};
      const delBtn=document.createElement('button');
      delBtn.className='ann2-del-btn'; delBtn.title='Hapus';
      delBtn.innerHTML='<svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:currentColor"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>';
      delBtn.onclick=ev=>{
        ev.stopPropagation(); if(ann.locked) return;
        _anns.splice(idx,1); if(_selIdx>=idx) _selIdx=Math.max(-1,_selIdx-1);
        _redraw();_renderAnnList();
      };
      item.append(dot,typeEl,nameEl,lockBtn,delBtn);
      list.appendChild(item);
    });
  }

  // ── Tags ──
  function _renderTagsArea() {
    const area=document.getElementById('ann2-tags-area');
    if(!area) return;
    area.innerHTML='';
    _curTags.forEach(tag=>{
      const chip=document.createElement('span');
      chip.className='ann2-tag-chip';
      const t=document.createTextNode(tag);
      const btn=document.createElement('button');
      btn.textContent='×'; btn.onclick=()=>{_curTags=_curTags.filter(x=>x!==tag);_renderTagsArea();};
      chip.appendChild(t); chip.appendChild(btn);
      area.appendChild(chip);
    });
  }

  window.ann2FilterTagSuggestions = function(val) {
    const sug=document.getElementById('ann2-tag-suggestions');
    if(!sug) return;
    const f=_tags.filter(t=>t.name.toLowerCase().includes(val.toLowerCase())&&!_curTags.includes(t.name));
    if(!val||!f.length){sug.style.display='none';return;}
    sug.style.display=''; sug.innerHTML='';
    f.forEach(t=>{
      const it=document.createElement('div'); it.className='ann2-sug-item'; it.textContent=t.name;
      it.onclick=()=>{if(!_curTags.includes(t.name)){_curTags.push(t.name);_renderTagsArea();}
        const inp=document.getElementById('ann2-tag-input'); if(inp) inp.value='';
        sug.style.display='none';};
      sug.appendChild(it);
    });
  };

  window.ann2TagKeydown = function(e) {
    if(e.key==='Enter'){
      const val=e.target.value.trim();
      const m=_tags.find(t=>t.name.toLowerCase()===val.toLowerCase());
      if(m&&!_curTags.includes(m.name)){_curTags.push(m.name);_renderTagsArea();}
      e.target.value='';
      document.getElementById('ann2-tag-suggestions').style.display='none';
      e.preventDefault();
    }
    if(e.key==='Escape') document.getElementById('ann2-tag-suggestions').style.display='none';
  };

  // ── Navigation ──
  window.ann2Prev=()=>{if(_idx>0)_loadImg(_idx-1);};
  window.ann2Next=()=>{if(_idx<_images.length-1)_loadImg(_idx+1);};

  // ── Save ──
  window.ann2Save = async function() {
    if(!_ds||!_images.length) return;
    const imgObj=_images[_idx];
    const btn=document.getElementById('ann2-save-btn');
    if(btn){btn.disabled=true;btn.textContent='Saving…';}
    let labelContent='';
    _anns.forEach(ann=>{
      const pts=ann.points.flat().map(v=>v.toFixed(6)).join(' ');
      labelContent+=`${ann.class_id} ${pts}\n`;
    });
    try {
      const r=await fetch(`/api/dataset/${encodeURIComponent(_ds.name)}/annotate/save-label`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({filename:imgObj.filename,label:labelContent})
      });
      if(!r.ok) throw new Error('Save failed');
      imgObj.annotations=_anns.map(a=>({class_id:a.class_id,points:a.points.map(p=>[...p])}));
      if(window.toast) toast('Tersimpan ✓');
    } catch(e) {
      if(window.toast) toast('Gagal: '+e.message,'err');
    }
    if(btn){btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:currentColor;margin-right:4px"><path d="M15,9H5V5H15M12,19A3,3 0 0,1 9,16A3,3 0 0,1 12,13A3,3 0 0,1 15,16A3,3 0 0,1 12,19M17,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V7L17,3Z"/></svg>Save (Ctrl+S)';}
  };

})();
</script>
